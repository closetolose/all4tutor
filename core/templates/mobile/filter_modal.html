<style>
    .tg-select-arrow {
        padding-right: 28px !important;
        background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%236366f1" d="M7 10l5 5 5-5z"/></svg>') no-repeat right center !important;
        background-size: 20px !important;
        color: var(--tg-active);
    }
    .mass-edit-fp-trigger {
        display: flex; align-items: center; justify-content: center; gap: 10px;
        padding: 14px; background: rgba(99, 102, 241, 0.08);
        border: 1px dashed var(--tg-active);
        border-radius: 14px; color: var(--tg-active);
        font-size: 14px; font-weight: 700; width: 100%; box-sizing: border-box;
    }
    .mass-edit-fp-trigger:active { background: rgba(99, 102, 241, 0.15); }
    .mass-edit-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    #mass-edit-modal .segment-control {
        display: flex; background: var(--tg-separator); padding: 4px; border-radius: 12px;
        margin: 0 0 16px 0; gap: 4px;
    }
    #mass-edit-modal .segment-option {
        flex: 1; text-align: center; padding: 12px 10px; min-height: 44px; border-radius: 10px;
        font-size: 14px; font-weight: 700; color: var(--tg-hint); transition: 0.2s; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
    }
    #mass-edit-modal .segment-option.active {
        background: var(--tg-card-bg); color: var(--tg-text);
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
</style>
<div id="mass-edit-modal" class="tg-modal" onclick="if(event.target===this)closeMassEditModal()">
    <div class="tg-modal-content">
        <div class="tg-modal-header">
            <h3>Массовая правка</h3>
            <button onclick="closeMassEditModal()" class="close-modal">&times;</button>
        </div>
        <div class="tg-modal-scroll">
            <div class="segment-control">
                <div class="segment-option active" id="m_mass_tab_ind" onclick="setMassEditType('individual')">
                    <i class="fas fa-user"></i> Индивидуально
                </div>
                <div class="segment-option" id="m_mass_tab_group" onclick="setMassEditType('group')">
                    <i class="fas fa-users"></i> Группа
                </div>
            </div>

            <div class="tg-section-title">Основное</div>
            <div class="tg-section no-margin">
                <div class="tg-input-row" id="m_mass_row_student">
                    <div class="tg-label"><i class="fas fa-user"></i> Ученик</div>
                    <div class="tg-field-wrap">
                        <select id="m_student">
                            <option value="">Не менять</option>
                            {% for s in tutor_students %}
                            <option value="{{ s.id }}">{{ s.first_name }} {{ s.last_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="tg-input-row last" id="m_mass_row_group" style="display: none;">
                    <div class="tg-label"><i class="fas fa-users"></i> Группа</div>
                    <div class="tg-field-wrap">
                        <select id="m_group">
                            <option value="">Не менять</option>
                            {% for g in tutor_groups %}
                            <option value="{{ g.id }}">{{ g.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="tg-input-row last">
                    <div class="tg-label"><i class="fas fa-book"></i> Предмет</div>
                    <div class="tg-field-wrap">
                        <select id="m_subject">
                            <option value="">Не менять</option>
                            {% for s in my_subjects %}
                            <option value="{{ s.id }}">{{ s.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <div class="tg-section-title">Расписание и цена</div>
            <div class="tg-section no-margin">
                <div class="tg-input-row">
                    <div class="tg-label">Дата</div>
                    <div class="tg-field-wrap"><input type="date" id="m_date"></div>
                </div>
                <div class="tg-input-row">
                    <div class="tg-label">Время</div>
                    <div class="tg-field-wrap"><input type="time" id="m_time"></div>
                </div>
                <div class="tg-input-row">
                    <div class="tg-label">Цена</div>
                    <div class="tg-field-wrap"><input type="number" id="m_price" placeholder="₽"></div>
                </div>
                <div class="tg-input-row last">
                    <div class="tg-label">Длит.</div>
                    <div class="tg-field-wrap"><input type="number" id="m_duration" placeholder="мин"></div>
                </div>
            </div>

            <div class="tg-section-title">Формат, место, заметки</div>
            <div class="tg-section no-margin">
                <div class="tg-input-row">
                    <div class="tg-label">Формат</div>
                    <div class="tg-field-wrap">
                        <select id="m_format">
                            <option value="">Не менять</option>
                            <option value="online">Онлайн</option>
                            <option value="offline">Очно</option>
                        </select>
                    </div>
                </div>
                <div class="tg-input-row">
                    <div class="tg-label">Место / Ссылка</div>
                    <div class="tg-field-wrap"><input type="text" id="m_location" placeholder="Не менять"></div>
                </div>
                <div class="tg-input-row last">
                    <div class="tg-label">Заметки</div>
                    <div class="tg-field-wrap"><textarea id="m_notes" rows="2" placeholder="Оставить без изменений"></textarea></div>
                </div>
            </div>

            <div class="tg-section-title">Материалы</div>
            <div class="tg-section no-margin">
                <button type="button" class="mass-edit-fp-trigger" onclick="openMobileFilePicker('mass-edit-files-display', 'mass-edit-files-select')">
                    <i class="fas fa-paperclip"></i> Прикрепить файлы из библиотеки
                </button>
                <div id="mass-edit-files-display" class="mass-edit-chips"></div>
                <select id="mass-edit-files-select" multiple hidden></select>
            </div>

            <button onclick="confirmMassEdit()" class="tg-modal-btn">Применить изменения</button>
        </div>
    </div>
</div>



<div id="filter-modal" class="tg-modal" onclick="if(event.target===this)closeModal('filter-modal')">
    <div class="tg-modal-content">
        <div class="tg-modal-header">
            <h3>Фильтры занятий</h3>
            <button onclick="closeModal('filter-modal')" class="close-modal">&times;</button>
        </div>
        <form method="GET" action="{% url 'index' %}" class="tg-modal-scroll" style="background: var(--tg-body-bg); padding-top: 20px;">

            <div class="tg-section-title">Ученик или группа</div>
            <div class="tg-section">
                <div class="tg-input-row last">
                    <div class="tg-field-wrap">
                        <select name="target" class="tg-select-arrow">
                            <option value="">Все</option>
                            <optgroup label="Ученики">
                                {% for s in tutor_students %}
                                <option value="s{{ s.id }}" {% if request.GET.target == 's'|add:s.id|stringformat:"s" %}selected{% endif %}>{{ s.first_name }} {{ s.last_name }}</option>
                                {% endfor %}
                            </optgroup>
                            <optgroup label="Группы">
                                {% for g in tutor_groups %}
                                <option value="g{{ g.id }}" {% if request.GET.target == 'g'|add:g.id|stringformat:"s" %}selected{% endif %}>{{ g.name }}</option>
                                {% endfor %}
                            </optgroup>
                        </select>
                    </div>
                </div>
            </div>

            <div class="tg-section-title">Предмет</div>
            <div class="tg-section">
                <div class="tg-input-row last">
                    <div class="tg-field-wrap">
                        <select name="subject" class="tg-select-arrow">
                            <option value="">Любой предмет</option>
                            {% for item in my_subjects %}
                            <option value="{{ item.id }}" {% if request.GET.subject == item.id|stringformat:"i" %}selected{% endif %}>{{ item.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <div class="tg-section-title">Период</div>
            <div class="tg-section">
                <div class="tg-input-row">
                    <div class="tg-label">От</div>
                    <div class="tg-field-wrap"><input type="date" name="date_from" value="{{ request.GET.date_from }}"></div>
                </div>
                <div class="tg-input-row last">
                    <div class="tg-label">До</div>
                    <div class="tg-field-wrap"><input type="date" name="date_to" value="{{ request.GET.date_to }}"></div>
                </div>
            </div>

            <div class="modal-actions-row" style="padding: 0 15px;">
                <a href="{% url 'index' %}" class="btn-secondary" style="text-align:center; display:flex; align-items:center; justify-content:center;">Сбросить</a>
                <button type="submit" class="btn-primary-modal">Применить</button>
            </div>
        </form>
    </div>
</div>

<!-- Bottom Sheet: посещаемость — список учеников (мобильная версия) -->
<div id="attendanceBottomSheet" class="tg-modal" style="display: none;" onclick="if(event.target===this)closeAttendanceListSheet()">
    <div class="tg-modal-content" onclick="event.stopPropagation()">
        <div class="tg-modal-header">
            <h3>Посещаемость</h3>
            <button type="button" onclick="closeAttendanceListSheet()" class="close-modal">&times;</button>
        </div>
        <div class="tg-modal-scroll" style="padding-top: 0;">
            <p id="attSheetLessonInfo" style="font-size: 13px; color: var(--tg-hint); margin: 0 0 12px;"></p>
            <ul id="attSheetList" style="list-style: none; margin: 0; padding: 0;"></ul>
        </div>
        <div class="tg-modal-footer">
            <button type="button" onclick="closeAttendanceListSheet()" class="btn-secondary" style="flex: 1;">Закрыть</button>
        </div>
    </div>
</div>

<script>
    let pressTimer, isSelectionMode = false, selectedLessons = new Set();

    function handleTouchStart(e, el) {
        if (isSelectionMode) return;
        el.style.transform = "scale(0.97)";
        pressTimer = window.setTimeout(() => {
            isSelectionMode = true;
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            toggleSelection(el);
            document.getElementById('selection-bar').style.display = 'flex';
        }, 600);
    }

    function handleTouchEnd(el) {
        clearTimeout(pressTimer);
        el.style.transform = "scale(1)";
    }

    function toggleSelection(el) {
        const id = el.getAttribute('data-id');
        if (selectedLessons.has(id)) {
            selectedLessons.delete(id);
            el.classList.remove('selected');
        } else {
            selectedLessons.add(id);
            el.classList.add('selected');
        }
        document.getElementById('selected-count').innerText = "Выбрано: " + selectedLessons.size;
        if (selectedLessons.size === 0) cancelSelection();
    }

    function handleCardClick(e, el) {
        if (e.target.closest('.mobile-attendance-btn')) return;
        if (isSelectionMode) {
            toggleSelection(el);
        } else {
            if (typeof openLessonDetailModalMobile === 'function') {
                openLessonDetailModalMobile(el);
            } else {
                window.location.href = "/lesson/edit/" + el.getAttribute('data-id') + "/";
            }
        }
    }

    function cancelSelection() {
        isSelectionMode = false;
        selectedLessons.clear();
        document.querySelectorAll('.lesson-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('selection-bar').style.display = 'none';
    }

    function openMassEdit() {
        document.getElementById('mass-edit-modal').style.display = 'flex';
    }

    function setMassEditType(type) {
        document.getElementById('m_mass_tab_ind').classList.toggle('active', type === 'individual');
        document.getElementById('m_mass_tab_group').classList.toggle('active', type === 'group');
        document.getElementById('m_mass_row_student').style.display = type === 'individual' ? '' : 'none';
        document.getElementById('m_mass_row_group').style.display = type === 'group' ? '' : 'none';
        if (type === 'group') document.getElementById('m_student').value = '';
        else document.getElementById('m_group').value = '';
    }

    function closeMassEditModal() {
        document.getElementById('mass-edit-modal').style.display = 'none';
    }

    function confirmMassEdit() {
        const form = document.getElementById('bulk-action-form');
        document.getElementById('lesson_ids_input').value = Array.from(selectedLessons).join(',');
        document.getElementById('action_type_input').value = 'mass_edit';

        var isGroup = document.getElementById('m_mass_tab_group').classList.contains('active');
        const fields = {
            'mass_subject': document.getElementById('m_subject').value,
            'mass_student': isGroup ? '' : document.getElementById('m_student').value,
            'mass_group': isGroup ? document.getElementById('m_group').value : '',
            'mass_date': document.getElementById('m_date').value,
            'mass_time': document.getElementById('m_time').value,
            'mass_price': document.getElementById('m_price').value,
            'mass_duration': document.getElementById('m_duration').value,
            'mass_format': document.getElementById('m_format') ? document.getElementById('m_format').value : '',
            'mass_location': document.getElementById('m_location') ? document.getElementById('m_location').value : '',
            'notes': document.getElementById('m_notes') ? document.getElementById('m_notes').value : ''
        };

        for (let key in fields) {
            if (fields[key]) {
                let input = document.createElement('input');
                input.type = 'hidden'; input.name = key; input.value = fields[key];
                form.appendChild(input);
            }
        }

        const materialsSelect = document.getElementById('mass-edit-files-select');
        if (materialsSelect) {
            const options = materialsSelect.options;
            if (options.length > 0) {
                const updatedInput = document.createElement('input');
                updatedInput.type = 'hidden'; updatedInput.name = 'materials_updated'; updatedInput.value = '1';
                form.appendChild(updatedInput);
            }
            for (let i = 0; i < options.length; i++) {
                const input = document.createElement('input');
                input.type = 'hidden'; input.name = 'materials'; input.value = options[i].value;
                form.appendChild(input);
            }
        }

        form.submit();
    }

    function submitBulkAction(type) {
        if (type === 'delete' && !confirm('Удалить выбранные уроки?')) return;
        document.getElementById('lesson_ids_input').value = Array.from(selectedLessons).join(',');
        document.getElementById('action_type_input').value = type;
        document.getElementById('bulk-action-form').submit();
    }
    function openModal(id) {
    const modal = document.getElementById(id);
    if (modal) {
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
}

function closeModal(id) {
    const modal = document.getElementById(id);
    if (modal) {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }
}

function lessonDetailEmptyVal(s) {
    var t = String(s || '').trim();
    if (!t) return '';
    if (t === '-' || t === '\u2014' || t === '\u002D' || t === '—' || t === '\\u002D' || t === '\\u2014') return '';
    if (/^[\s\-—\u2014\u002D]+$/.test(t)) return '';
    return t;
}
function openLessonDetailModalMobile(card) {
    var d = card.dataset;
    var location = lessonDetailEmptyVal(d.location);
    var showYandex = location && !/^https?:\/\//i.test(location);
    document.getElementById('lessonDetailSubjectM').textContent = lessonDetailEmptyVal(d.subject);
    document.getElementById('lessonDetailDateTimeM').textContent = (d.date || '') + ' ' + (d.time || '').trim();
    document.getElementById('lessonDetailDurationM').textContent = (d.duration || '60') + ' мин';
    document.getElementById('lessonDetailFormatM').textContent = lessonDetailEmptyVal(d.format);
    var participantsM = document.getElementById('lessonDetailParticipantsM');
    if (participantsM) participantsM.textContent = lessonDetailEmptyVal(d.participants);
    document.getElementById('lessonDetailLocationM').textContent = location;
    var yandexWrap = document.getElementById('lessonDetailYandexWrapM');
    var yandexLink = document.getElementById('lessonDetailYandexLinkM');
    if (showYandex && yandexLink) {
        yandexLink.href = 'https://yandex.ru/maps/?text=' + encodeURIComponent(location);
        yandexWrap.style.display = 'block';
    } else {
        yandexWrap.style.display = 'none';
    }
    var notesWrap = document.getElementById('lessonDetailNotesWrapM');
    var notesEl = document.getElementById('lessonDetailNotesM');
    var notesVal = lessonDetailEmptyVal(d.notes);
    if (notesVal && notesEl) {
        notesEl.textContent = notesVal;
        notesWrap.style.display = 'block';
    } else {
        if (notesEl) notesEl.textContent = '';
        notesWrap.style.display = 'none';
    }
    var materialsWrap = document.getElementById('lessonDetailMaterialsWrapM');
    var namesStr = d.materialsNames || '';
    var listEl = document.getElementById('lessonDetailMaterialsListM');
    var downloadAll = document.getElementById('lessonDetailDownloadAllM');
    if (namesStr && listEl) {
        listEl.innerHTML = namesStr.split('|||').map(function(n) { var div = document.createElement('li'); div.textContent = n; return div.outerHTML; }).join('');
        if (downloadAll && d.downloadUrl) {
            downloadAll.href = d.downloadUrl;
            downloadAll.style.display = 'inline-flex';
        }
        materialsWrap.style.display = 'block';
    } else {
        listEl.innerHTML = '';
        if (downloadAll) downloadAll.style.display = 'none';
        materialsWrap.style.display = 'none';
    }
    var editLink = document.getElementById('lessonDetailEditLinkM');
    if (editLink) editLink.href = '/lesson/edit/' + (card.getAttribute('data-id') || '') + '/';
    var modal = document.getElementById('lessonDetailModalMobile');
    if (modal) {
        modal.style.display = 'flex';
        modal.onclick = function(e) { if (e.target === modal) closeModal('lessonDetailModalMobile'); };
        document.body.style.overflow = 'hidden';
    }
}
var attendanceListSheetState = { cardEl: null, attendances: [] };

function openAttendanceListSheet(cardEl) {
    var raw = cardEl.getAttribute('data-attendances');
    if (!raw) return;
    var attendances = [];
    try {
        attendances = JSON.parse(raw);
    } catch (e) {
        return;
    }
    attendanceListSheetState.cardEl = cardEl;
    attendanceListSheetState.attendances = attendances;

    document.getElementById('attSheetLessonInfo').textContent =
        (cardEl.getAttribute('data-subject') || '') + ', ' + (cardEl.getAttribute('data-datetime') || '');

    var listEl = document.getElementById('attSheetList');
    listEl.innerHTML = '';
    attendances.forEach(function(a) {
        var li = document.createElement('li');
        li.style.cssText = 'display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--tg-separator); gap: 12px;';
        var nameSpan = document.createElement('span');
        nameSpan.textContent = a.name;
        nameSpan.style.fontWeight = '700';
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tg-modal-btn';
        btn.style.margin = '0';
        btn.dataset.attId = String(a.id);
        btn.textContent = a.present ? 'Присутствовал' : 'Отсутствовал';
        if (!a.present) { btn.style.background = 'transparent'; btn.style.border = '1px solid var(--tg-separator)'; btn.style.color = 'var(--tg-hint)'; }
        li.appendChild(nameSpan);
        li.appendChild(btn);
        listEl.appendChild(li);
    });

    var sheet = document.getElementById('attendanceBottomSheet');
    sheet.style.display = 'flex';
    sheet.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function updateMobileAttendanceSummary(cardEl, attendances) {
    if (!cardEl) return;
    var present = attendances.filter(function(a) { return a.present; }).length;
    var total = attendances.length;
    var summary = cardEl.querySelector('.att-summary');
    if (summary) summary.textContent = present + '/' + total;
    cardEl.setAttribute('data-attendances', JSON.stringify(attendances));
}

function closeAttendanceListSheet() {
    var sheet = document.getElementById('attendanceBottomSheet');
    sheet.style.display = 'none';
    sheet.classList.remove('active');
    document.body.style.overflow = '';
    attendanceListSheetState.cardEl = null;
    attendanceListSheetState.attendances = [];
}

document.getElementById('attSheetList').addEventListener('click', function(e) {
    var btn = e.target.closest('button[data-att-id]');
    if (!btn || btn.closest('#attSheetList') !== this) return;
    e.preventDefault();
    e.stopPropagation();
    if (btn.classList.contains('ajax-loading')) return;
    var attId = btn.dataset.attId;
    var cardEl = attendanceListSheetState.cardEl;
    var attendances = attendanceListSheetState.attendances;
    var a = attendances && attendances.find(function(x) { return String(x.id) === attId; });
    if (!a || !cardEl) return;
    btn.classList.add('ajax-loading');
    btn.disabled = true;
    fetch('/toggle-presence/' + attId + '/', {
        method: 'POST',
        headers: { 'X-CSRFToken': '{{ csrf_token }}', 'Content-Type': 'application/json' }
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        btn.classList.remove('ajax-loading');
        btn.disabled = false;
        if (data.status === 'ok') {
            a.present = data.was_present;
            btn.textContent = data.was_present ? 'Присутствовал' : 'Отсутствовал';
            btn.style.background = data.was_present ? '' : 'transparent';
            btn.style.border = data.was_present ? '' : '1px solid var(--tg-separator)';
            btn.style.color = data.was_present ? '' : 'var(--tg-hint)';
            updateMobileAttendanceSummary(cardEl, attendances);
        }
    })
    .catch(function() {
        btn.classList.remove('ajax-loading');
        btn.disabled = false;
    });
});

let currentPage = 1;
    let isLoading = false;
    let hasMore = {{ has_more|yesno:"true,false" }};

    window.addEventListener('scroll', () => {
        if (isLoading || !hasMore) return;
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
            loadMoreLessons();
        }
    });

    async function loadMoreLessons() {
        isLoading = true;
        document.getElementById('lazy-loader').style.display = 'block';
        currentPage++;

        const params = new URLSearchParams(window.location.search);
        params.set('page', currentPage);

        try {
            const response = await fetch(`/load-more-lessons/?${params.toString()}`);
            const data = await response.json();
            hasMore = data.has_more;
            // Вставляем новые уроки в конец списка
            document.querySelector('.lesson-list').insertAdjacentHTML('beforeend', data.html);
        } catch (error) {
            console.error("Ошибка загрузки:", error);
        } finally {
            isLoading = false;
            document.getElementById('lazy-loader').style.display = 'none';
        }
    }

</script>
