<style>
    .mass-edit-fp-trigger {
        display: flex; align-items: center; justify-content: center; gap: 10px;
        padding: 14px; background: rgba(99, 102, 241, 0.08);
        border: 1px dashed var(--tg-active);
        border-radius: 14px; color: var(--tg-active);
        font-size: 14px; font-weight: 700; width: 100%; box-sizing: border-box;
    }
    .mass-edit-fp-trigger:active { background: rgba(99, 102, 241, 0.15); }
    .mass-edit-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    #mass-edit-modal .segment-control {
        display: flex; background: var(--tg-separator); padding: 4px; border-radius: 12px;
        margin: 0 0 16px 0; gap: 4px;
    }
    #mass-edit-modal .segment-option {
        flex: 1; text-align: center; padding: 10px; border-radius: 10px;
        font-size: 14px; font-weight: 700; color: var(--tg-hint); transition: 0.2s; cursor: pointer;
    }
    #mass-edit-modal .segment-option.active {
        background: var(--tg-card-bg); color: var(--tg-text);
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
</style>
<div id="mass-edit-modal" class="tg-modal" onclick="if(event.target===this)closeMassEditModal()">
    <div class="tg-modal-content">
        <div class="tg-modal-header">
            <h3>Массовая правка</h3>
            <button onclick="closeMassEditModal()" class="close-modal">&times;</button>
        </div>
        <div class="tg-modal-scroll">
            <div class="segment-control">
                <div class="segment-option active" id="m_mass_tab_ind" onclick="setMassEditType('individual')">
                    <i class="fas fa-user"></i> Индивидуально
                </div>
                <div class="segment-option" id="m_mass_tab_group" onclick="setMassEditType('group')">
                    <i class="fas fa-users"></i> Группа
                </div>
            </div>

            <div class="tg-section-title">Основное</div>
            <div class="tg-section no-margin">
                <div class="tg-input-row" id="m_mass_row_student">
                    <div class="tg-label"><i class="fas fa-user"></i> Ученик</div>
                    <div class="tg-field-wrap">
                        <select id="m_student">
                            <option value="">Не менять</option>
                            {% for s in tutor_students %}
                            <option value="{{ s.id }}">{{ s.first_name }} {{ s.last_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="tg-input-row last" id="m_mass_row_group" style="display: none;">
                    <div class="tg-label"><i class="fas fa-users"></i> Группа</div>
                    <div class="tg-field-wrap">
                        <select id="m_group">
                            <option value="">Не менять</option>
                            {% for g in tutor_groups %}
                            <option value="{{ g.id }}">{{ g.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="tg-input-row last">
                    <div class="tg-label"><i class="fas fa-book"></i> Предмет</div>
                    <div class="tg-field-wrap">
                        <select id="m_subject">
                            <option value="">Не менять</option>
                            {% for s in my_subjects %}
                            <option value="{{ s.subject.id }}">{{ s.subject.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <div class="tg-section-title">Расписание и цена</div>
            <div class="tg-section no-margin">
                <div class="tg-input-row">
                    <div class="tg-label">Дата</div>
                    <div class="tg-field-wrap"><input type="date" id="m_date"></div>
                </div>
                <div class="tg-input-row">
                    <div class="tg-label">Время</div>
                    <div class="tg-field-wrap"><input type="time" id="m_time"></div>
                </div>
                <div class="tg-input-row">
                    <div class="tg-label">Цена</div>
                    <div class="tg-field-wrap"><input type="number" id="m_price" placeholder="₽"></div>
                </div>
                <div class="tg-input-row last">
                    <div class="tg-label">Длит.</div>
                    <div class="tg-field-wrap"><input type="number" id="m_duration" placeholder="мин"></div>
                </div>
            </div>

            <div class="tg-section-title">Материалы</div>
            <div class="tg-section no-margin">
                <button type="button" class="mass-edit-fp-trigger" onclick="openMobileFilePicker('mass-edit-files-display', 'mass-edit-files-select')">
                    <i class="fas fa-paperclip"></i> Прикрепить файлы из библиотеки
                </button>
                <div id="mass-edit-files-display" class="mass-edit-chips"></div>
                <select id="mass-edit-files-select" multiple hidden></select>
            </div>

            <button onclick="confirmMassEdit()" class="tg-modal-btn">Применить изменения</button>
        </div>
    </div>
</div>



<div id="filter-modal" class="tg-modal" onclick="if(event.target===this)closeModal('filter-modal')">
    <div class="tg-modal-content">
        <div class="tg-modal-header">
            <h3>Фильтры занятий</h3>
            <button onclick="closeModal('filter-modal')" class="close-modal">&times;</button>
        </div>
        <form method="GET" action="{% url 'index' %}" class="tg-modal-scroll" style="background: var(--tg-body-bg); padding-top: 20px;">

            <div class="tg-section-title">Ученик или группа</div>
            <div class="tg-section">
                <div class="tg-input-row last">
                    <div class="tg-field-wrap">
                        <select name="target" style="padding-right: 20px; background: url('data:image/svg+xml;utf8,<svg fill=\"%236366f1\" height=\"24\" viewBox=\"0 0 24 24\" width=\"24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M7 10l5 5 5-5z\"/></svg>') no-repeat right center; background-size: 20px;">
                            <option value="">Все</option>
                            <optgroup label="Ученики">
                                {% for s in tutor_students %}
                                <option value="s{{ s.id }}" {% if request.GET.target == 's'|add:s.id|stringformat:"s" %}selected{% endif %}>{{ s.first_name }} {{ s.last_name }}</option>
                                {% endfor %}
                            </optgroup>
                            <optgroup label="Группы">
                                {% for g in tutor_groups %}
                                <option value="g{{ g.id }}" {% if request.GET.target == 'g'|add:g.id|stringformat:"s" %}selected{% endif %}>{{ g.name }}</option>
                                {% endfor %}
                            </optgroup>
                        </select>
                    </div>
                </div>
            </div>

            <div class="tg-section-title">Предмет</div>
            <div class="tg-section">
                <div class="tg-input-row last">
                    <div class="tg-field-wrap">
                        <select name="subject" style="padding-right: 20px; background: url('data:image/svg+xml;utf8,<svg fill=\"%236366f1\" height=\"24\" viewBox=\"0 0 24 24\" width=\"24\" xmlns=\"http://www.w3.org/2000/svg\"><path d=\"M7 10l5 5 5-5z\"/></svg>') no-repeat right center; background-size: 20px;">
                            <option value="">Любой предмет</option>
                            {% for item in my_subjects %}
                            <option value="{{ item.subject.id }}" {% if request.GET.subject == item.subject.id|stringformat:"i" %}selected{% endif %}>{{ item.subject.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <div class="tg-section-title">Период</div>
            <div class="tg-section">
                <div class="tg-input-row">
                    <div class="tg-label">От</div>
                    <div class="tg-field-wrap"><input type="date" name="date_from" value="{{ request.GET.date_from }}"></div>
                </div>
                <div class="tg-input-row last">
                    <div class="tg-label">До</div>
                    <div class="tg-field-wrap"><input type="date" name="date_to" value="{{ request.GET.date_to }}"></div>
                </div>
            </div>

            <div class="modal-actions-row" style="padding: 0 15px;">
                <a href="{% url 'index' %}" class="btn-secondary" style="text-align:center; display:flex; align-items:center; justify-content:center;">Сбросить</a>
                <button type="submit" class="btn-primary-modal">Применить</button>
            </div>
        </form>
    </div>
</div>

<script>
    let pressTimer, isSelectionMode = false, selectedLessons = new Set();

    function handleTouchStart(e, el) {
        if (isSelectionMode) return;
        el.style.transform = "scale(0.97)";
        pressTimer = window.setTimeout(() => {
            isSelectionMode = true;
            if (window.navigator.vibrate) window.navigator.vibrate(50);
            toggleSelection(el);
            document.getElementById('selection-bar').style.display = 'flex';
        }, 600);
    }

    function handleTouchEnd(el) {
        clearTimeout(pressTimer);
        el.style.transform = "scale(1)";
    }

    function toggleSelection(el) {
        const id = el.getAttribute('data-id');
        if (selectedLessons.has(id)) {
            selectedLessons.delete(id);
            el.classList.remove('selected');
        } else {
            selectedLessons.add(id);
            el.classList.add('selected');
        }
        document.getElementById('selected-count').innerText = "Выбрано: " + selectedLessons.size;
        if (selectedLessons.size === 0) cancelSelection();
    }

    function handleCardClick(e, el) {
        if (isSelectionMode) {
            toggleSelection(el);
        } else {
            window.location.href = "/lesson/edit/" + el.getAttribute('data-id') + "/";
        }
    }

    function cancelSelection() {
        isSelectionMode = false;
        selectedLessons.clear();
        document.querySelectorAll('.lesson-card').forEach(c => c.classList.remove('selected'));
        document.getElementById('selection-bar').style.display = 'none';
    }

    function openMassEdit() {
        document.getElementById('mass-edit-modal').style.display = 'flex';
    }

    function setMassEditType(type) {
        document.getElementById('m_mass_tab_ind').classList.toggle('active', type === 'individual');
        document.getElementById('m_mass_tab_group').classList.toggle('active', type === 'group');
        document.getElementById('m_mass_row_student').style.display = type === 'individual' ? '' : 'none';
        document.getElementById('m_mass_row_group').style.display = type === 'group' ? '' : 'none';
        if (type === 'group') document.getElementById('m_student').value = '';
        else document.getElementById('m_group').value = '';
    }

    function closeMassEditModal() {
        document.getElementById('mass-edit-modal').style.display = 'none';
    }

    function confirmMassEdit() {
        const form = document.getElementById('bulk-action-form');
        document.getElementById('lesson_ids_input').value = Array.from(selectedLessons).join(',');
        document.getElementById('action_type_input').value = 'mass_edit';

        var isGroup = document.getElementById('m_mass_tab_group').classList.contains('active');
        const fields = {
            'mass_subject': document.getElementById('m_subject').value,
            'mass_student': isGroup ? '' : document.getElementById('m_student').value,
            'mass_group': isGroup ? document.getElementById('m_group').value : '',
            'mass_date': document.getElementById('m_date').value,
            'mass_time': document.getElementById('m_time').value,
            'mass_price': document.getElementById('m_price').value,
            'mass_duration': document.getElementById('m_duration').value
        };

        for (let key in fields) {
            if (fields[key]) {
                let input = document.createElement('input');
                input.type = 'hidden'; input.name = key; input.value = fields[key];
                form.appendChild(input);
            }
        }

        const materialsSelect = document.getElementById('mass-edit-files-select');
        if (materialsSelect) {
            const options = materialsSelect.options;
            if (options.length > 0) {
                const updatedInput = document.createElement('input');
                updatedInput.type = 'hidden'; updatedInput.name = 'materials_updated'; updatedInput.value = '1';
                form.appendChild(updatedInput);
            }
            for (let i = 0; i < options.length; i++) {
                const input = document.createElement('input');
                input.type = 'hidden'; input.name = 'materials'; input.value = options[i].value;
                form.appendChild(input);
            }
        }

        form.submit();
    }

    function submitBulkAction(type) {
        if (type === 'delete' && !confirm('Удалить выбранные уроки?')) return;
        document.getElementById('lesson_ids_input').value = Array.from(selectedLessons).join(',');
        document.getElementById('action_type_input').value = type;
        document.getElementById('bulk-action-form').submit();
    }
    function openModal(id) {
    const modal = document.getElementById(id);
    if (modal) {
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
}

function closeModal(id) {
    const modal = document.getElementById(id);
    if (modal) {
        modal.style.display = 'none';
        document.body.style.overflow = 'auto';
    }
}
function quickTogglePresence(el, attId) {

    fetch(`/toggle-presence/${attId}/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': '{{ csrf_token }}',
            'Content-Type': 'application/json'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'ok') {
            if (data.was_present) {
                el.classList.add('present');
            } else {
                el.classList.remove('present');
            }
        }
    })
    .catch(error => console.error('Ошибка:', error));
}
let currentPage = 1;
    let isLoading = false;
    let hasMore = {{ has_more|yesno:"true,false" }};

    window.addEventListener('scroll', () => {
        if (isLoading || !hasMore) return;
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
            loadMoreLessons();
        }
    });

    async function loadMoreLessons() {
        isLoading = true;
        document.getElementById('lazy-loader').style.display = 'block';
        currentPage++;

        const params = new URLSearchParams(window.location.search);
        params.set('page', currentPage);

        try {
            const response = await fetch(`/load-more-lessons/?${params.toString()}`);
            const data = await response.json();
            hasMore = data.has_more;
            // Вставляем новые уроки в конец списка
            document.querySelector('.lesson-list').insertAdjacentHTML('beforeend', data.html);
        } catch (error) {
            console.error("Ошибка загрузки:", error);
        } finally {
            isLoading = false;
            document.getElementById('lazy-loader').style.display = 'none';
        }
    }

    // Делегирование кликов по точкам посещаемости: перехват в capture-фазе,
    // чтобы клик по точке не всплывал до карточки и не открывал редактирование
    document.addEventListener('click', (e) => {
        const attDot = e.target.closest('.att-dot');
        const dotsContainer = e.target.closest('.attendance-dots');
        if (dotsContainer || attDot) {
            e.stopPropagation();
            e.preventDefault();
        }
        if (attDot && attDot.dataset.attId) {
            quickTogglePresence(attDot, attDot.dataset.attId);
        }
    }, true);
</script>
