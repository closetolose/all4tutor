{% extends 'mobile/base.html' %}

{% block header_left %}
    <a href="{% url 'chat_list' %}" class="m-back-link"><i class="fas fa-chevron-left"></i></a>
{% endblock %}

{% block content %}
<div class="bot-chat-m">
    <div class="bot-chat-messages-m" id="botChatMessages">
        {% for msg in bot_messages %}
            <div class="bot-msg-m {% if msg.role == 'user' %}user{% else %}assistant{% endif %}">
                <div class="bot-msg-bubble">{{ msg.content|linebreaksbr }}</div>
                <span class="bot-msg-time">{{ msg.created_at|date:"d.m H:i" }}</span>
            </div>
        {% empty %}
            <p style="text-align: center; color: var(--tg-hint); padding: 24px;">Задайте любой вопрос — нейросеть поможет</p>
        {% endfor %}
    </div>

    <div class="bot-chat-form-m">
        <form method="post" class="bot-chat-form-inner" id="botChatForm">
            {% csrf_token %}
            <textarea name="text" placeholder="Сообщение..." rows="1" required></textarea>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>
</div>

<style>
.bot-chat-m { display: flex; flex-direction: column; height: calc(100vh - 120px); }
.bot-chat-messages-m { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.bot-msg-m { max-width: 85%; }
.bot-msg-m.user { align-self: flex-end; }
.bot-msg-m.assistant { align-self: flex-start; }
.bot-msg-bubble {
    padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.5; word-break: break-word;
}
.bot-msg-m.user .bot-msg-bubble { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
.bot-msg-m.assistant .bot-msg-bubble { background: var(--card-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.bot-msg-time { font-size: 11px; color: var(--tg-hint); margin-top: 4px; display: block; }
.bot-chat-form-m { padding: 12px 16px; border-top: 1px solid var(--border); background: var(--card-bg); }
.bot-chat-form-inner { display: flex; gap: 10px; align-items: center; }
.bot-chat-form-inner textarea {
    flex: 1; min-height: 44px; max-height: 100px; padding: 10px 14px; border-radius: 22px;
    border: 1px solid var(--border); font-size: 15px; resize: none;
}
.bot-chat-form-inner .btn { flex-shrink: 0; height: 44px; }
.bot-chat-form-inner textarea:focus { outline: none; border-color: var(--primary); }
</style>

<script>
(function() {
    var el = document.getElementById('botChatMessages');
    if (el) el.scrollTop = el.scrollHeight;

    var form = document.getElementById('botChatForm');
    var textarea = form && form.querySelector('textarea');
    if (form && textarea) {
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                form.submit();
            }
        });
    }
})();
</script>
{% endblock %}
