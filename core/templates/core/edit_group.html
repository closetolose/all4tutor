{% extends 'core/base.html' %}
{% block title %}Редактировать группу{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <h2>Редактировать группу: {{ group.name }}</h2>

        <form method="post" id="edit-group-main-form">
            {% csrf_token %}

            <div class="form-section">
                <div class="form-section-title">Основное</div>

                <div class="form-group">
                    <label class="form-label">Название</label>
                    {{ form.name }}
                </div>

                <div class="form-group">
                    <label class="form-label">Предмет</label>
                    {{ form.subject }}
                </div>

                <div class="form-group">
                    <label class="form-label">Ученики</label>
                    <div class="students-checklist">
                        {{ form.students }}
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Сохранить группу</button>
                <a href="{% url 'my_students' %}" class="btn btn-outline">Отмена</a>
            </div>
        </form>

        <div class="form-section form-section-divider">
            <div class="form-section-title">Цвет группы</div>
            <form action="{% url 'update_group_color' group.id %}" method="post" id="edit-group-color-form">
                {% csrf_token %}
                <input type="hidden" name="color_hex" id="edit-group-color-hex" value="{{ group_color_hex|default:'' }}">
                <div class="entity-color-palette" style="margin-bottom: 12px;">
                    <span class="color-swatch" data-color="#6366f1" style="background:#6366f1;"></span>
                    <span class="color-swatch" data-color="#22c55e" style="background:#22c55e;"></span>
                    <span class="color-swatch" data-color="#f59e0b" style="background:#f59e0b;"></span>
                    <span class="color-swatch" data-color="#ef4444" style="background:#ef4444;"></span>
                    <span class="color-swatch" data-color="#ec4899" style="background:#ec4899;"></span>
                    <span class="color-swatch" data-color="#8b5cf6" style="background:#8b5cf6;"></span>
                    <span class="color-swatch" data-color="#06b6d4" style="background:#06b6d4;"></span>
                    <span class="color-swatch" data-color="#84cc16" style="background:#84cc16;"></span>
                </div>
                <div class="color-picker-row">
                    <input type="color" id="edit-group-color-picker" value="{{ group_color_hex|default:'#6366f1' }}" class="m-color-picker-input">
                    <span class="form-hint">или свой цвет</span>
                </div>
                <div class="form-actions form-actions--no-margin">
                    <button type="submit" class="btn btn-outline">Сохранить цвет</button>
                    <button type="button" class="btn btn-outline" onclick="document.getElementById('edit-group-color-hex').value=''; document.getElementById('edit-group-color-form').submit();">Убрать цвет</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
(function() {
    var form = document.getElementById('edit-group-color-form');
    if (!form) return;
    var hidden = document.getElementById('edit-group-color-hex');
    var picker = document.getElementById('edit-group-color-picker');
    form.querySelectorAll('.color-swatch').forEach(function(sw) {
        sw.addEventListener('click', function() {
            var c = this.getAttribute('data-color');
            hidden.value = c;
            if (picker) picker.value = c;
        });
    });
    if (picker) picker.addEventListener('input', function() { hidden.value = this.value; });
})();
</script>
{% endblock %}
