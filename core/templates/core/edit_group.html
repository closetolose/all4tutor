{% extends 'core/base.html' %}
{% block title %}Редактировать группу{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <h2>Редактировать группу: {{ group.name }}</h2>
        <form method="post" id="edit-group-main-form">
            {% csrf_token %}
            
            <div class="mb-20">
                <label>Название</label>
                {{ form.name }}
            </div>
            
             <div class="mb-20">
                <label>Предмет</label>
                {{ form.subject }}
            </div>

            <div class="mb-20">
                <label>Ученики</label>
                <div style="max-height: 200px; overflow-y: auto; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                    {{ form.students }}
                </div>
            </div>

            <div style="display: flex; gap: 8px; margin-top: 20px;">
                <button type="submit" class="btn btn-primary">Сохранить группу</button>
                <a href="{% url 'my_students' %}" class="btn btn-outline">Отмена</a>
            </div>
        </form>

            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);">
                <label style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted);">Цвет группы</label>
                <form action="{% url 'update_group_color' group.id %}" method="post" id="edit-group-color-form" style="margin-top: 10px;">
                    {% csrf_token %}
                    <input type="hidden" name="color_hex" id="edit-group-color-hex" value="{{ group_color_hex|default:'' }}">
                    <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px;">
                        <span class="color-swatch" data-color="#6366f1" style="width:28px;height:28px;border-radius:8px;background:#6366f1;cursor:pointer;"></span>
                        <span class="color-swatch" data-color="#22c55e" style="width:28px;height:28px;border-radius:8px;background:#22c55e;cursor:pointer;"></span>
                        <span class="color-swatch" data-color="#f59e0b" style="width:28px;height:28px;border-radius:8px;background:#f59e0b;cursor:pointer;"></span>
                        <span class="color-swatch" data-color="#ef4444" style="width:28px;height:28px;border-radius:8px;background:#ef4444;cursor:pointer;"></span>
                        <span class="color-swatch" data-color="#ec4899" style="width:28px;height:28px;border-radius:8px;background:#ec4899;cursor:pointer;"></span>
                        <span class="color-swatch" data-color="#8b5cf6" style="width:28px;height:28px;border-radius:8px;background:#8b5cf6;cursor:pointer;"></span>
                        <span class="color-swatch" data-color="#06b6d4" style="width:28px;height:28px;border-radius:8px;background:#06b6d4;cursor:pointer;"></span>
                        <span class="color-swatch" data-color="#84cc16" style="width:28px;height:28px;border-radius:8px;background:#84cc16;cursor:pointer;"></span>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 10px;">
                        <input type="color" id="edit-group-color-picker" value="{{ group_color_hex|default:'#6366f1' }}" style="width: 40px; height: 36px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer;">
                        <span style="font-size: 12px; color: var(--text-muted);">или свой цвет</span>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button type="submit" class="btn btn-primary">Сохранить цвет</button>
                        <button type="button" class="btn btn-outline" onclick="document.getElementById('edit-group-color-hex').value=''; document.getElementById('edit-group-color-form').submit();">Убрать цвет</button>
                    </div>
                </form>
            </div>
    </div>
</div>
<script>
(function() {
    var form = document.getElementById('edit-group-color-form');
    if (!form) return;
    var hidden = document.getElementById('edit-group-color-hex');
    var picker = document.getElementById('edit-group-color-picker');
    form.querySelectorAll('.color-swatch').forEach(function(sw) {
        sw.addEventListener('click', function() {
            var c = this.getAttribute('data-color');
            hidden.value = c;
            if (picker) picker.value = c;
        });
    });
    if (picker) picker.addEventListener('input', function() { hidden.value = this.value; });
})();
</script>
{% endblock %}
