{% extends 'core/auth_base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div style="text-align: center; margin-bottom: 24px;">
            <div style="width: 56px; height: 56px; background: var(--primary-light); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                <i class="fas fa-graduation-cap" style="font-size: 24px; color: var(--primary);"></i>
            </div>
            <h2 style="margin-bottom: 4px;">Добро пожаловать!</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin: 0;">Войдите в свой аккаунт All4Tutors</p>
        </div>

        {% if form.errors %}
        <div style="background: var(--danger-bg); color: var(--danger-text); padding: 12px 16px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; display: flex; align-items: center; gap: 8px; border: 1px solid #fecaca;">
            <i class="fas fa-exclamation-circle"></i> Неверное имя пользователя или пароль.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="browser_timezone" id="browser_timezone">

            <div class="auth-form-group">
                <label class="auth-label">Имя пользователя</label>
                <input type="text" name="username" class="auth-input" required autocomplete="username" placeholder="Введите логин">
            </div>

            <div class="auth-form-group">
                <label class="auth-label">Пароль</label>
                <div class="password-wrapper">
                    <input type="password" name="password" class="auth-input" required autocomplete="current-password" placeholder="Введите пароль" id="loginPassword" style="margin-bottom: 0;">
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">
                        <i class="far fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-auth">Войти</button>
        </form>

        <div class="auth-footer">
            <div>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></div>
            <div style="margin-top: 15px;">
                <a href="{% url 'password_reset' %}" class="forgot-link">Забыли пароль?</a>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'far fa-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'far fa-eye';
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const tzInput = document.getElementById('browser_timezone');
    if (tzInput) {
        tzInput.value = Intl.DateTimeFormat().resolvedOptions().timeZone;
    }
});
</script>
{% endblock %}
